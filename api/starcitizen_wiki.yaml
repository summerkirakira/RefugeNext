          in: query
          description: 'Same as filter[manufacturer]. Accepts comma-separated values for OR matching. Example: `Anvil Aerospace`'
          schema:
            type: string
        -
          name: 'filter[class_name]'
          in: query
          description: 'Partial match on item class name. Example: `MGA_Assault`'
          schema:
            type: string
        -
          name: 'filter[name]'
          in: query
          description: 'Partial match on item display name. Example: `Arrow`'
          schema:
            type: string
        -
          name: 'filter[classification]'
          in: query
          description: 'Partial match on item classification (dot-notation, e.g. FPS.Armor). (see GET /api/items/filters for valid values). Example: `FPS.Armor.Torso`'
