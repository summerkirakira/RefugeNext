              format: double
              nullable: true
              x-suffix: ' ×'
            energy:
              description: 'Energy damage multiplier. Incoming damage is scaled by this value.'
              type: number
              format: double
              nullable: true
              x-suffix: ' ×'
            distortion:
              description: 'Distortion damage multiplier. Incoming damage is scaled by this value.'
              type: number
              format: double
              nullable: true
              x-suffix: ' ×'
            thermal:
              description: 'Thermal damage multiplier. Incoming damage is scaled by this value.'
              type: number
              format: double
              nullable: true
              x-suffix: ' ×'
            biochemical:
              description: 'Biochemical damage multiplier. Incoming damage is scaled by this value.'
              type: number
              format: double
              nullable: true
              x-suffix: ' ×'
            stun:
              description: 'Stun damage multiplier. Incoming damage is scaled by this value.'
              type: number
              format: double
              nullable: true
              x-suffix: ' ×'
          type: object
          nullable: true
      type: object
