      properties:
        width:
          description: 'Width in meters.'
          type: number
          format: double
          example: 0.52
          x-suffix: ' m'
        height:
          description: 'Height in meters.'
          type: number
          format: double
          example: 0.18
          x-suffix: ' m'
        length:
          description: 'Length in meters.'
          type: number
          format: double
          example: 1.12
          x-suffix: ' m'
      type: object
    item_distortion:
      title: 'Item Distortion'
      description: 'Distortion information from stdItem.Distortion.'
      properties:
        decay_rate:
          description: 'Rate at which distortion damage recovers per second. Higher values mean faster recovery.'
          type: number
          format: double
          nullable: true
          x-suffix: ' /s'
        decay_delay:
          description: 'Delay in seconds before distortion recovery begins after taking damage.'
          type: number
          format: double
          nullable: true
          x-suffix: ' s'
        max:
          description: 'Maximum distortion pool capacity, total distortion damage the item can absorb before shutting down.'
          type: number
          format: double
          nullable: true
        maximum:
          description: 'Deprecated: Use max.'
          type: number
          format: double
          nullable: true
          deprecated: true
        overload_ratio:
          description: 'Deprecated: Does not exist in game data.'
          type: number
          format: double
          nullable: true
          deprecated: true
        warning_ratio:
          description: 'Ratio of max at which a distortion warning indicator triggers (e.g. 0.75 = warning at 75%).'
          type: number
          format: double
          nullable: true
          x-tabulator-formatter: pct
        recovery_ratio:
          description: 'Threshold below which distortion must fall before the item reactivates after overload. 0 = immediate recovery.'
          type: number
          format: double
          nullable: true
          x-tabulator-formatter: pct
        recovery_time:
          description: 'Deprecated: Does not exist in game data.'
          type: number
          format: double
          nullable: true
          deprecated: true
