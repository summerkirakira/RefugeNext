              example: Neutral
            faction_type:
              description: 'Category of the faction. One of: Lawful, Unlawful, LawEnforcement, PrivateSecurity.'
              type: string
              example: Lawful
            able_to_arrest:
              description: 'Whether the faction can arrest players.'
              type: boolean
              example: false
            polices_lawful_trespass:
              description: 'Whether the faction enforces trespass violations against lawful characters.'
              type: boolean
              example: false
            polices_criminality:
              description: 'Whether the faction actively polices criminal activity.'
              type: boolean
              example: false
            no_legal_rights:
              description: 'Whether the faction operates without legal protections.'
              type: boolean
              example: false
            has_reputation:
              description: 'Whether the faction tracks player reputation.'
              type: boolean
              example: true
            headquarters:
              description: "Location of the faction's headquarters."
