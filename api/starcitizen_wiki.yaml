  /api/items:
    get:
      tags:
        - Items
      summary: 'In-Game Item Overview'
      description: 'Returns paginated in-game items for the requested category and game version. Always includes manufacturer, game version, and description data. Crafting blueprints are loaded automatically. Supports filtering by type, classification, manufacturer, size, grade, and more. Available includes: shops, variants, related_items, blueprints, vehicles, shops.items. Supports 150+ JSON field sorts. (see GET /api/items/filters for valid filter values)'
      operationId: listItems
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          $ref: '#/components/parameters/include'
        -
          $ref: '#/components/parameters/version'
        -
          name: sort
          in: query
          description: 'Sort field. Prefix with "-" for descending. Supports 250+ JSON fields. Examples: name, -grade, weapon.damage.alpha_total, -shield_controller.face_type. Use comma for multiple: grade,-name'
          schema:
            type: string
            example: '-weapon.damage.alpha_total'
        -
          name: 'filter[variants]'
          in: query
          description: 'When false, excludes variant items (base_id IS NOT NULL) and returns only base items. When true or omitted, returns all items including variants.'
          schema:
            type: boolean
        -
          name: 'filter[category]'
          in: query
          description: 'Item category to scope results. Accepts: weapons, weapon-attachments, clothes, armor, food, medical, mining-modifiers, fps-items, vehicle-weapons, vehicle-items, vehicle-flair-items, vehicle-components. Example: `weapons`'
          schema:
            type: string
        -
          name: 'filter[type]'
          in: query
          description: 'Exact match on item type. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `WeaponPersonal`'
          schema:
            type: string
        -
          name: 'filter[sub_type]'
          in: query
          description: 'Exact match on item sub-type. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `Barrel`'
          schema:
            type: string
        -
          name: 'filter[manufacturer]'
          in: query
          description: 'Manufacturer name or code. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `KnightBridge Arms`'
          schema:
            type: string
        -
          name: 'filter[manufacturer.name]'
          in: query
          description: 'Same as filter[manufacturer]. Accepts comma-separated values for OR matching. Example: `Anvil Aerospace`'
          schema:
            type: string
        -
          name: 'filter[class_name]'
          in: query
          description: 'Partial match on item class name. Example: `Controller_Comms`'
          schema:
            type: string
        -
          name: 'filter[name]'
          in: query
          description: 'Partial match on item display name. Example: `Arrow`'
          schema:
            type: string
        -
          name: 'filter[query]'
          in: query
          description: 'Search items by name or class name. Example: `helmet`'
          schema:
            type: string
        -
          name: 'filter[classification]'
          in: query
          description: 'Partial match on item classification (dot-notation, e.g. FPS.Armor). (see GET /api/items/filters for valid values). Example: `FPS.Armor.Torso`'
          schema:
            type: string
        -
          name: 'filter[size]'
          in: query
          description: 'Exact item size (0-12). Example: `3`'
          schema:
            type: number
        -
          name: 'filter[grade]'
          in: query
          description: 'Exact item grade (1-7, mapped to A-G). Example: `3`'
          schema:
            type: number
        -
          name: 'filter[class]'
          in: query
          description: 'Exact match on item class. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `Military`'
          schema:
            type: string
        -
          name: 'filter[rarity]'
          in: query
          description: 'Item rarity. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `Rare`'
          schema:
            type: string
        -
          name: 'filter[event_source]'
          in: query
          description: 'Event or reward source label. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `IAE`'
          schema:
            type: string
        -
          name: 'filter[include_irrelevant]'
          in: query
          description: 'When set to true, includes items flagged as not player-relevant (test, placeholder, dev items). Default shows only relevant items.'
          schema:
            type: boolean
        -
          name: 'filter[tags]'
          in: query
          description: 'Filter by stdItem.RequiredTags array values. Use when a port has required_tags - matches items whose RequiredTags contain ALL specified values. Accepts comma-separated tags for AND matching. Example: `MISC_Fury_Miru`'
          schema:
            type: string
        -
          name: 'filter[port_tags]'
          in: query
          description: "Filter items by RequiredTags compatibility with a port's tags. Accepts comma-separated port tag values. Returns items where any of their RequiredTags appear in the provided tags, OR items with no RequiredTags but whose Tags overlap with the provided tags (e.g. older paint system). Items with no RequiredTags and no overlapping Tags are excluded. Pass the port_tags value from a vehicle hardpoint port. Example: `flight_ready,Ship_Dock_Refuel`"
          schema:
            type: string
        -
          name: 'filter[vehicle]'
          in: query
          description: "Scope items to a specific vehicle. Accepts one or more vehicle identity tags (from the vehicle's port_tags field). Returns: (1) universal items with no RequiredTags and not bespoke, (2) bespoke items whose RequiredTags match any provided tag, (3) bespoke items whose bespoke_vehicle_tags match any provided tag. Use on vehicle pages to show only items equippable on that vehicle. Example: `AEGS_Avenger_Base`"
          schema:
            type: string
      responses:
        '200':
          description: 'List of Items'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/game_item' } }
                  links: { $ref: '#/components/schemas/pagination_links' }
                  meta: { $ref: '#/components/schemas/pagination_meta' }
                type: object
              examples:
                item_search_page:
                  summary: 'Search items by text'
                  value: { data: [{ uuid: 00000000-0000-0000-0000-000000000000, name: 'Flight Helmet', slug: flight-helmet }], links: { first: 'https://api.star-citizen.wiki/api/items?page[number]=1', last: null, prev: null, next: null }, meta: { current_page: 1, per_page: 30, total: 1 } }
