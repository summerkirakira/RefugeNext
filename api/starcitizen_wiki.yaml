    comm_link_link:
      title: 'Comm-Link Link'
      description: "An external hyperlink found within a Comm-Link's content."
      properties:
        href:
          description: 'The URL the link points to.'
          type: string
          format: uri
          example: 'http://robertsspaceindustries.com/forums/'
        text:
          description: 'Display text of the hyperlink.'
          type: string
          example: forums
      type: object
    comm_link:
      title: Comm-Link
      description: 'A Spectrum Comm-Link published by Cloud Imperium Games on robertsspaceindustries.com.'
      properties:
        id:
          description: 'CIG identifier for the Comm-Link'
          type: integer
          example: 12663
        title:
          description: 'Title of the Comm-Link'
          type: string
          example: 'This Week in Star Citizen'
        rsi_url:
          description: 'Link to the Comm-Link on the RSI website.'
          type: string
          format: uri
        api_url:
          description: 'API URL for this Comm-Link resource.'
          type: string
          format: uri
        api_public_url:
          description: 'Public web URL for this Comm-Link on the API portal.'
          type: string
          format: uri
        channel:
          description: 'Publishing channel, e.g. Engineering, Transmission.'
          type: string
          example: Engineering
        category:
          description: 'Content category, e.g. General, Community, Lore, Development.'
          type: string
          example: General
        series:
          description: 'Series the Comm-Link belongs to, e.g. Around the Verse, 10 For the Chairman.'
          type: string
          example: 'Around the Verse'
