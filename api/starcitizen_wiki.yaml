openapi: 3.0.0
info:
  title: 'Star Citizen Wiki API'
  description: "The community-maintained Star Citizen data API powering [starcitizen.tools](https://starcitizen.tools) and [Star Citizen Wiki](https://star-citizen.wiki).\n\n## Getting Started\n\n- **Base URL:** `https://api.star-citizen.wiki`\n- **Format:** JSON\n- **Auth:** Most endpoints are public and require no authentication. Some endpoints (e.g. similar image search) require a Sanctum bearer token.\n- **Game Versions:** Game data endpoints are version-scoped. Omit the `version` parameter to use the current default version. See `GET /api/game-versions` for available versions.\n- **Pagination:** List endpoints return paginated results using `page[number]` and `page[size]` (max 200). Responses include `links` and `meta` pagination metadata.\n- **Sorting:** Use `sort` with field names. Prefix with `-` for descending (e.g. `-name`).\n- **Filtering:** Use `filter[field]=value` syntax. See each endpoint's filter parameters and the corresponding `/filters` endpoints for valid values.\n- **Rate Limits:** Search endpoints are rate-limited to 60 requests/minute per IP. Image search endpoints are limited to 10 requests/minute.\n\n## OpenAPI Specification\n\n- YAML: `GET /api/openapi`\n- Interactive docs: [docs.star-citizen.wiki](https://docs.star-citizen.wiki)\n\n## Attribution\n\nThis API is maintained by the Star Citizen Wiki community. Data is sourced from game files, RSI website, and community contributions.\n"
  contact:
    email: foxftw@star-citizen.wiki
  license:
    name: 'MIT (code only)'
    url: 'https://opensource.org/licenses/MIT'
  version: 3.0.0
servers:
  -
    url: 'https://api.star-citizen.wiki'
    description: 'Production API'
paths:
  /api/blueprints:
    get:
      tags:
        - Blueprints
      summary: 'List Game Blueprints'
      description: 'Returns paginated crafting blueprints, including ingredients, crafted items, and dismantle returns. Results are scoped to the requested or default game version.'
      operationId: listBlueprints
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          $ref: '#/components/parameters/version'
        -
          name: sort
          in: query
          description: 'Sort field. Prefix with "-" for descending. Supported: craft_time_seconds, ingredient_count, unlocking_missions_count.'
          schema:
            type: string
            example: '-craft_time_seconds'
        -
          name: 'filter[query]'
          in: query
          description: 'Search blueprints by crafted item name. Example: `Shotgun`'
          schema:
            type: string
        -
          name: 'filter[output.uuid]'
          in: query
          description: 'Filter by crafted item UUID (see GET /api/items). Example: `02d4cd2e-fa98-4086-aee1-6b2dfce8ea27`'
          schema:
            type: string
            format: uuid
        -
          name: 'filter[output.name]'
          in: query
          description: 'Filter by crafted item name. Example: `P4-AR Magazine (40 cap)`'
          schema:
            type: string
        -
          name: 'filter[output.class]'
          in: query
          description: 'Filter by crafted item class. Example: `ksar_smg_energy_01_gold01`'
          schema:
            type: string
        -
          name: 'filter[output.type]'
          in: query
          description: 'Filter by crafted item type (see GET /api/blueprints/filters for valid values). Example: `WeaponPersonal`'
          schema:
            type: string
        -
          name: 'filter[default]'
          in: query
          description: 'Filter by default availability (true/false). Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[ingredient]'
          in: query
          description: 'Matches ingredient resource type by name, key, or UUID before filtering blueprints. Example: `Aluminum`'
          schema:
            type: string
        -
          name: 'filter[ingredient.uuid]'
          in: query
          description: 'Filter by ingredient commodity UUID. Accepts comma-separated values (see GET /api/commodities). Example: `fde0cd65-8827-4b23-804d-cc8845dfa7ac`'
          schema:
            type: string
            format: uuid
        -
          name: 'filter[resource.uuid]'
          in: query
          description: 'Filter by resource commodity UUID, matching ingredients and dismantle returns. Accepts comma-separated values (see GET /api/commodities). Example: `fde0cd65-8827-4b23-804d-cc8845dfa7ac`'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'List of blueprints'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/blueprint' } }
                  links: { $ref: '#/components/schemas/pagination_links' }
                  meta: { $ref: '#/components/schemas/pagination_meta' }
                type: object
  '/api/blueprints/{blueprint}':
    get:
      tags:
        - Blueprints
      summary: 'Get Game Blueprint Detail'
      description: 'Returns full detail for a single crafting blueprint, including ingredients, crafted item, dismantle returns, and associated missions. Scoped to the requested or default game version.'
      operationId: getBlueprint
      parameters:
        -
          name: blueprint
          in: path
          required: true
          schema:
            description: 'Blueprint UUID'
            type: string
            example: 280f47b7-8434-410c-b854-380768fdccec
        -
          $ref: '#/components/parameters/version'
      responses:
        '200':
          description: 'Blueprint detail'
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/blueprint' }
                type: object
        '404':
          description: 'Blueprint not found for the requested game version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
  /api/blueprints/filters:
    get:
      tags:
        - Blueprints
      summary: 'Get Blueprint Filter Options'
      description: 'Returns available filter facets for blueprints (crafted item types, ingredient and resource UUIDs), optionally scoped to the requested or default game version.'
      operationId: listBlueprintFilters
      parameters:
        -
          $ref: '#/components/parameters/version'
      responses:
        '200':
          description: 'Filter facets for blueprints'
          content:
            application/json:
              schema:
                properties:
                  filters: { properties: { output.type: { description: 'Crafted item types (e.g. WeaponPersonal, Char_Armor_Torso, WeaponAttachment)', type: array, items: { $ref: '#/components/schemas/filter_value' } }, ingredient.uuid: { description: 'Ingredient commodity UUIDs with names and counts', type: array, items: { $ref: '#/components/schemas/filter_value' } }, resource.uuid: { description: 'Combined ingredient and dismantle return resource UUIDs with names and counts', type: array, items: { $ref: '#/components/schemas/filter_value' } } }, type: object }
                type: object
  /api/commodities:
    get:
      tags:
        - Commodities
      summary: 'List Game Commodities'
      description: 'Returns paginated game commodities with location data and resource metadata, optionally filtered to only those consumed by blueprints. Results include refined version info and starmap location data scoped to the requested or default game version.'
      operationId: listCommodities
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          $ref: '#/components/parameters/version'
        -
          name: sort
          in: query
          description: 'Sort field. Prefix with "-" for descending. Supported: key, name, rarity, density, instability, resistance, signature.'
          schema:
            type: string
            example: '-rarity'
        -
          name: 'filter[used]'
          in: query
          description: 'When true, only commodities used by blueprint ingredients in the requested or default game version are returned. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[system]'
          in: query
          description: 'Star system where the commodity can be found (see GET /api/commodities/filters for valid values). Example: `Stanton System`'
          schema:
            type: string
        -
          name: 'filter[type]'
          in: query
          description: 'Location type name (see GET /api/commodities/filters for valid values). Example: `Planet`'
          schema:
            type: string
        -
          name: 'filter[rarity]'
          in: query
          description: 'Commodity tier/rarity level, lowercase (see GET /api/commodities/filters for valid values). Example: `epic`'
          schema:
            type: string
        -
          name: 'filter[kind]'
          in: query
          description: 'Resource kind (see GET /api/commodities/filters for valid values). Example: `mineable`'
          schema:
            type: string
        -
          name: 'filter[group]'
          in: query
          description: 'Commodity group name. Comma-separated for multiple. Example: `ProcessedGoods,Food`'
          schema:
            type: string
        -
          name: 'filter[refined_version]'
          in: query
          description: 'Refined version name (see GET /api/commodities/filters for valid values). Example: `Agricium`'
          schema:
            type: string
        -
          name: 'filter[location]'
          in: query
          description: 'Partial match on starmap location name. Example: `ArcCorp`'
          schema:
            type: string
        -
          name: 'filter[query]'
          in: query
          description: 'Search commodities by name or key. Example: `Agricium`'
          schema:
            type: string
        -
          name: 'filter[ship]'
          in: query
          description: 'When true, only show commodities mineable by ships. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[ground_vehicle]'
          in: query
          description: 'When true, only show commodities mineable by ground vehicles. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[fps]'
          in: query
          description: 'When true, only show commodities mineable on foot (FPS). Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[harvestable]'
          in: query
          description: 'When true, only show commodities collectible from harvestable or plant deposits. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[salvage]'
          in: query
          description: 'When true, only show commodities obtainable through salvage. Example: `false`'
          schema:
            type: boolean
        -
          name: 'filter[mineable]'
          in: query
          description: 'When true, only show mineable commodities; when false, only show non-mineable. Example: `true`'
          schema:
            type: boolean
      responses:
        '200':
          description: 'List of commodities'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/commodity_link' } }
                  links: { $ref: '#/components/schemas/pagination_links' }
                  meta: { $ref: '#/components/schemas/pagination_meta' }
                type: object
              examples:
                commodities_by_location:
                  summary: 'Commodities filtered by location'
                  value: { data: [{ uuid: 00000000-0000-0000-0000-000000000000, name: Agricium, slug: agricium }], links: { first: 'https://api.star-citizen.wiki/api/commodities?page[number]=1', last: null, prev: null, next: null }, meta: { current_page: 1, per_page: 30, total: 1 } }
  '/api/commodities/{commodity}':
    get:
      tags:
        - Commodities
      summary: 'Show Game Commodity'
      description: 'Returns full details for a single game commodity including detailed location entries with starmap data, resource composition, areas, clustering data, and raw/refined version info. Results are scoped to the requested or default game version. Optionally include related blueprints and items.'
      operationId: getCommodity
      parameters:
        -
          name: commodity
          in: path
          required: true
          schema:
            description: 'Commodity UUID or slug'
            type: string
            example: agricium
        -
          $ref: '#/components/parameters/version'
        -
          name: include
          in: query
          description: 'Comma-separated relationships to include. Available: blueprints (crafting blueprints that use this commodity), items (items that produce or require this commodity).'
          schema:
            type: string
            example: 'blueprints,items'
      responses:
        '200':
          description: 'Commodity details'
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/commodity_show' }
                type: object
              examples:
                commodity_detail:
                  summary: 'Commodity detail response'
                  value: { data: { uuid: 00000000-0000-0000-0000-000000000000, name: Agricium, slug: agricium } }
        '404':
          description: 'Commodity not found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
  /api/commodities/filters:
    get:
      tags:
        - Commodities
      summary: 'Game Commodity Filters'
      description: 'Returns all available filter values for game commodities, scoped to the requested or default game version. Filter values can be combined; providing a system filter will narrow the location facet to that system only.'
      operationId: listCommodityFilters
      parameters:
        -
          $ref: '#/components/parameters/version'
        -
          name: 'filter[used]'
          in: query
          description: 'When true, filter facets to only commodities used by blueprint ingredients. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[system]'
          in: query
          description: 'Star system where the commodity can be found. Example: `Stanton System`'
          schema:
            type: string
        -
          name: 'filter[type]'
          in: query
          description: 'Location type name. Example: `Planet`'
          schema:
            type: string
        -
          name: 'filter[rarity]'
          in: query
          description: 'Commodity tier/rarity level, lowercase. Example: `epic`'
          schema:
            type: string
        -
          name: 'filter[kind]'
          in: query
          description: 'Resource kind. Example: `mineable`'
          schema:
            type: string
        -
          name: 'filter[group]'
          in: query
          description: 'Commodity group name. Comma-separated for multiple. Example: `ProcessedGoods,Food`'
          schema:
            type: string
        -
          name: 'filter[refined_version]'
          in: query
          description: 'Refined version name. Example: `Agricium`'
          schema:
            type: string
        -
          name: 'filter[location]'
          in: query
          description: 'Partial match on starmap location name. Example: `ArcCorp`'
          schema:
            type: string
        -
          name: 'filter[query]'
          in: query
          description: 'Search commodities by name or key. Example: `Agricium`'
          schema:
            type: string
        -
          name: 'filter[ship]'
          in: query
          description: 'When true, only show commodities mineable by ships. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[ground_vehicle]'
          in: query
          description: 'When true, only show commodities mineable by ground vehicles. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[fps]'
          in: query
          description: 'When true, only show commodities mineable on foot (FPS). Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[harvestable]'
          in: query
          description: 'When true, only show commodities collectible from harvestable or plant deposits. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[salvage]'
          in: query
          description: 'When true, only show commodities obtainable through salvage. Example: `false`'
          schema:
            type: boolean
        -
          name: 'filter[mineable]'
          in: query
          description: 'When true, only show mineable commodities; when false, only show non-mineable. Example: `true`'
          schema:
            type: boolean
      responses:
        '200':
          description: 'Available filters for game commodities.'
          content:
            application/json:
              schema:
                properties:
                  filters: { properties: { system: { description: 'Star systems where commodities can be found', type: array, items: { $ref: '#/components/schemas/filter_value' } }, type: { description: 'Location type names', type: array, items: { $ref: '#/components/schemas/filter_value' } }, rarity: { description: 'Commodity tier/rarity levels', type: array, items: { $ref: '#/components/schemas/filter_value' } }, kind: { description: 'Resource kinds', type: array, items: { $ref: '#/components/schemas/filter_value' } }, refined_version: { description: 'Refined version names', type: array, items: { $ref: '#/components/schemas/filter_value' } }, group: { description: 'Commodity groups', type: array, items: { $ref: '#/components/schemas/filter_value' } }, location: { description: 'Starmap locations grouped by system', type: array, items: { $ref: '#/components/schemas/filter_value' } } }, type: object }
                type: object
  /api/factions:
    get:
      tags:
        - Factions
      summary: 'List Factions'
      description: 'Returns paginated factions sorted by name by default. Factions hidden from the Delphi app are excluded.'
      operationId: listFactions
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          name: 'filter[faction_type]'
          in: query
          description: 'Category of faction. Example: `Lawful`'
          schema:
            type: string
        -
          name: 'filter[has_reputation]'
          in: query
          description: 'When true, only factions with a reputation system are returned. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[lawful]'
          in: query
          description: 'When true, only lawful factions are returned. Example: `true`'
          schema:
            type: boolean
        -
          name: 'filter[is_npc]'
          in: query
          description: 'When true, only NPC-controlled factions are returned. Example: `false`'
          schema:
            type: boolean
        -
          name: 'filter[hide_in_delphi_app]'
          in: query
          description: 'When true, only factions hidden from the Delphi app are returned. Note: the index endpoint excludes hidden factions by default. Example: `false`'
          schema:
            type: boolean
        -
          name: 'filter[query]'
          in: query
          description: 'Search factions by name or description. Example: `ArcCorp`'
          schema:
            type: string
        -
          name: sort
          in: query
          description: 'Sort field. Prefix with "-" for descending. Supported: name, faction_type.'
          schema:
            type: string
            example: '-name'
      responses:
        '200':
          description: 'List of factions'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/faction_index' } }
                  links: { $ref: '#/components/schemas/pagination_links' }
                  meta: { $ref: '#/components/schemas/pagination_meta' }
                type: object
  '/api/factions/{faction}':
    get:
      tags:
        - Factions
      summary: 'Get Faction Detail'
      description: 'Returns full details for a single faction, including reputation ladder with standings when the faction has a reputation system. Factions hidden from the Delphi app are excluded.'
      operationId: getFaction
      parameters:
        -
          name: faction
          in: path
          required: true
          schema:
            description: 'Faction UUID.'
            type: string
            format: uuid
            example: 4e429470-4d4e-4c2b-a4ac-4de42ada16e0
      responses:
        '200':
          description: 'Faction detail'
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/faction' }
                type: object
        '404':
          description: 'Faction not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
  /api/game-versions:
    get:
      tags:
        - 'Game Versions'
      summary: 'List Game Versions'
      description: 'Returns paginated game versions sorted by release date (newest first by default). Useful for discovering available game versions for version-scoped API queries.'
      operationId: listGameVersions
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          name: 'filter[code]'
          in: query
          description: 'Filter by exact version code. Example: `4.8.0-LIVE.11825000`'
          schema:
            type: string
        -
          name: 'filter[channel]'
          in: query
          description: 'Filter by release channel (live, ptu, eptu), lowercase. Example: `live`'
          schema:
            type: string
        -
          name: 'filter[is_default]'
          in: query
          description: 'Filter by default status. Example: `1`'
          schema:
            type: integer
        -
          name: sort
          in: query
          description: 'Sort by field. Prefix with - for descending. Supported: code, channel, released_at.'
          schema:
            type: string
            example: '-released_at'
      responses:
        '200':
          description: 'Paginated list of Game Versions'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/game_version' } }
                  links: { allOf: [{ $ref: '#/components/schemas/pagination_links' }] }
                  meta: { allOf: [{ $ref: '#/components/schemas/pagination_meta' }] }
                type: object
  /api/game-versions/default:
    get:
      tags:
        - 'Game Versions'
      summary: 'Get Default Game Version'
      description: 'Returns the current default game version. This is the version used by default in version-scoped API queries (see the version query parameter on other endpoints).'
      operationId: getDefaultGameVersion
      responses:
        '200':
          description: 'The default game version'
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/game_version' }
                type: object
              examples:
                default_game_version:
                  summary: 'Current default version'
                  value: { data: { code: 4.8.0-LIVE.11825000, channel: live, is_default: true } }
        '404':
          description: 'No default version found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
  '/api/game-versions/{identifier}':
    get:
      tags:
        - 'Game Versions'
      summary: 'Get Game Version'
      description: 'Retrieve a specific game version by its code (case-insensitive). Game versions are used to scope version-aware data endpoints via the `version` query parameter.'
      operationId: getGameVersion
      parameters:
        -
          name: identifier
          in: path
          description: 'Game version code (case-insensitive).'
          required: true
          schema:
            type: string
            example: 4.8.0-LIVE.11825000
      responses:
        '200':
          description: 'A game version'
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/game_version' }
                type: object
        '404':
          description: 'Game version not found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
  /api/weapons:
    get:
      tags:
        - Items
      summary: 'In-Game Weapons Overview'
      description: 'Alias for /api/items scoped to FPS weapons (WeaponPersonal type). Results are scoped to the requested or default game version. Returns weapon items with manufacturer, game version, and description data.'
      operationId: listWeapons
      parameters:
        -
          $ref: '#/components/parameters/page'
        -
          $ref: '#/components/parameters/page_number'
        -
          $ref: '#/components/parameters/page_size'
        -
          $ref: '#/components/parameters/include'
        -
          $ref: '#/components/parameters/version'
        -
          $ref: '#/components/parameters/sort'
        -
          name: 'filter[manufacturer]'
          in: query
          description: 'Manufacturer name or code. Accepts comma-separated values for OR matching. (see GET /api/items/filters for valid values). Example: `Klaus & Werner`'
          schema:
            type: string
        -
          name: 'filter[class_name]'
          in: query
          description: 'Partial match on item class name. Example: `behr_sniper_ballistic_01`'
          schema:
            type: string
        -
          name: 'filter[name]'
          in: query
          description: 'Partial match on item display name. Example: `Arrow`'
          schema:
            type: string
        -
          name: 'filter[query]'
          in: query
          description: 'Search items by name or class name. Example: `Arrow`'
          schema:
            type: string
        -
          name: 'filter[size]'
          in: query
          description: 'Exact item size (0-12). Example: `3`'
          schema:
            type: number
        -
          name: 'filter[grade]'
          in: query
          description: 'Exact item grade (1-7, mapped to A-G). Example: `1`'
          schema:
            type: number
        -
          name: 'filter[include_irrelevant]'
          in: query
          description: 'When set to true, includes items flagged as not player-relevant (test, placeholder, dev items). Default shows only relevant items.'
          schema:
            type: boolean
      responses:
        '200':
          description: 'List of Weapons'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/game_item' } }
                  links: { $ref: '#/components/schemas/pagination_links' }
                  meta: { $ref: '#/components/schemas/pagination_meta' }
                type: object
  /api/weapon-attachments:
    get:
      tags:
        - Items
      summary: 'In-Game Weapon Attachments Overview'
      description: 'Alias for /api/items scoped to weapon attachments (WeaponAttachment type, excluding magazines and missiles). Results are scoped to the requested or default game version. Returns attachment items with manufacturer, game version, and description data.'
      operationId: listWeaponAttachments
      parameters:
        -
