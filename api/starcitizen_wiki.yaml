  /api/user:
    get:
      tags:
        - Auth
      summary: 'Get Authenticated User'
      description: 'Returns the currently authenticated user. Requires a valid Sanctum bearer token.'
      operationId: getAuthenticatedUser
      responses:
        '200':
          description: 'The authenticated user'
          content:
            application/json:
              schema:
                properties:
                  id: { type: integer, example: 1 }
                  name: { type: string, example: 'John Doe' }
                  email: { type: string, format: email, example: john@example.com }
                  email_verified_at: { type: string, format: date-time, nullable: true }
                  is_admin: { type: boolean, example: false }
                  language_id: { type: integer, example: 1, nullable: true }
                  created_at: { type: string, format: date-time, nullable: true }
                  updated_at: { type: string, format: date-time, nullable: true }
                type: object
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthenticated_error_response'
      security:
        -
          sanctum: []
components:
  schemas:
    filter_value:
      title: 'Filter Value'
      description: 'A value available for filtering with a human label and optional result count.'
      properties:
        value:
          nullable: true
          oneOf:
            -
              type: string
            -
              type: integer
            -
              type: boolean
        label:
          type: string
        count:
          description: 'Result count when supplied by the facet.'
          type: integer
          nullable: true
      type: object
    blueprint_output:
      title: 'Blueprint Output'
      description: 'Crafted output metadata for a blueprint.'
      properties:
        uuid:
          description: 'UUID of the crafted item'
          type: string
          format: uuid
          nullable: true
        name:
          description: 'Display name of the crafted item'
          type: string
          nullable: true
        class:
          description: 'Internal class identifier of the crafted item'
          type: string
          nullable: true
        type:
          description: 'Type category of the crafted item (e.g. WeaponPersonal, Char_Armor_Torso)'
          type: string
          nullable: true
        type_label:
          description: 'Human-readable label for the type'
          type: string
          nullable: true
        sub_type:
          description: 'Sub-type classification of the crafted item'
          type: string
          nullable: true
        subtype:
          description: 'Deprecated: Use sub_type.'
          type: string
          nullable: true
          deprecated: true
        grade:
          description: 'Grade or quality tier of the crafted item'
          type: string
          nullable: true
        item_web_url:
          description: 'Web URL for the crafted item detail page'
          type: string
          format: uri
          nullable: true
      type: object
    blueprint_modifier_quality_range:
      title: 'Blueprint Modifier Quality Range'
      properties:
        min:
          description: 'Minimum quality value'
          type: number
          format: float
          nullable: true
        max:
          description: 'Maximum quality value'
          type: number
          format: float
          nullable: true
      type: object
    blueprint_modifier_range:
      title: 'Blueprint Modifier Range'
      properties:
        at_min_quality:
          description: 'Modifier value at minimum quality'
          type: number
          format: float
          nullable: true
        at_max_quality:
          description: 'Modifier value at maximum quality'
          type: number
          format: float
          nullable: true
      type: object
    blueprint_modifier:
      title: 'Blueprint Modifier'
      description: 'Modifier interpolation metadata used for blueprint quality effects.'
      properties:
        property_key:
          description: 'Internal key identifying the modifier property'
          type: string
        property_uuid:
          description: 'UUID of the property definition, if available'
          type: string
          format: uuid
          nullable: true
        label:
          description: 'Human-readable label for the modifier'
          type: string
        better_when:
          description: 'Indicates whether a higher or lower value is desirable'
          type: string
          enum:
            - higher
            - lower
            - neutral
          nullable: true
        quality_range:
          $ref: '#/components/schemas/blueprint_modifier_quality_range'
        modifier_range:
          $ref: '#/components/schemas/blueprint_modifier_range'
        value_range_type:
          description: 'Interpolation type for the modifier value range. When present, value_segments should be used for interpolation instead of the simple quality_range/modifier_range pair.'
          type: string
          enum:
            - linear
          nullable: true
        value_segments:
          description: 'Multi-step interpolation segments. Each segment defines its own quality range and modifier start/end values. When present, use these for interpolation instead of quality_range/modifier_range.'
          type: array
          items:
            properties:
              quality_min:
                description: 'Start quality for this segment'
                type: integer
              quality_max:
                description: 'End quality for this segment'
                type: integer
              modifier_at_start:
                description: 'Modifier value at quality_min'
                type: number
                format: float
              modifier_at_end:
                description: 'Modifier value at quality_max'
                type: number
                format: float
            type: object
          nullable: true
      type: object
    blueprint_summary_property:
      title: 'Blueprint Summary Property'
      description: 'Aggregated modifier property shown in blueprint output summaries.'
      properties:
        property_key:
          description: 'Internal key identifying the property'
          type: string
        property_uuid:
          description: 'UUID of the property definition, if available'
          type: string
          format: uuid
          nullable: true
        label:
          description: 'Human-readable label for the property'
          type: string
        better_when:
          description: 'Indicates whether a higher or lower value is desirable'
          type: string
          enum:
            - higher
            - lower
            - neutral
          nullable: true
      type: object
    blueprint_requirement_child:
      title: 'Blueprint Requirement Child'
      description: 'Normalized blueprint requirement child entry. Children can represent groups, resources, or discrete items.'
      properties:
        key:
          description: 'Internal key of the requirement child'
          type: string
          nullable: true
        kind:
          description: 'Type of requirement entry'
          type: string
          enum:
            - group
            - resource
            - item
          nullable: true
        uuid:
          description: 'UUID of the required resource type or item'
          type: string
          format: uuid
          nullable: true
        name:
          description: 'Display name of the required resource or item'
          type: string
          nullable: true
        required_count:
          description: 'Number of this child required within its group'
          type: integer
          nullable: true
        quantity:
          description: 'Discrete item count required'
          type: number
          format: float
          nullable: true
        quantity_scu:
          description: 'Quantity in Standard Cargo Units (for resources)'
          type: number
          format: float
          nullable: true
        min_quality:
          description: 'Minimum quality tier required'
          type: integer
          nullable: true
        modifiers:
          description: 'Quality-dependent modifier effects for this child'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_modifier'
        children:
          description: 'Nested children when kind is group'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_requirement_child'
          nullable: true
      type: object
    blueprint_requirement_group:
      title: 'Blueprint Requirement Group'
      description: 'Normalized requirement group derived from the first blueprint tier.'
      properties:
        key:
          description: 'Internal key of the requirement group'
          type: string
          nullable: true
        name:
          description: 'Display name of the requirement group'
          type: string
          nullable: true
        kind:
          description: 'Always "group"'
          type: string
          enum:
            - group
        required_count:
          description: 'Number of children that must be fulfilled within this group'
          type: integer
          nullable: true
        modifiers:
          description: 'Quality-dependent modifier effects applied at the group level'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_modifier'
        children:
          description: 'Individual resources or items within this group'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_requirement_child'
      type: object
    blueprint_requirement_node:
      title: 'Blueprint Requirement Node'
      description: 'Raw recursive requirement node returned under tiers[].requirements.'
      properties:
        kind:
          description: 'Node type in the requirement tree'
          type: string
          enum:
            - root
            - group
            - resource
            - item
          nullable: true
        key:
          description: 'Internal key of the requirement node'
          type: string
          nullable: true
        name:
          description: 'Display name of the requirement node'
          type: string
          nullable: true
        uuid:
          description: 'UUID of the required resource type or item'
          type: string
          format: uuid
          nullable: true
        required_count:
          description: 'Number of children that must be fulfilled'
          type: integer
          nullable: true
        quantity:
          description: 'Discrete item count required'
          type: number
          format: float
          nullable: true
        quantity_scu:
          description: 'Quantity in Standard Cargo Units (for resources)'
          type: number
          format: float
          nullable: true
        min_quality:
          description: 'Minimum quality tier required'
          type: integer
          nullable: true
        modifiers:
          description: 'Quality-dependent modifier effects'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_modifier'
          nullable: true
        children:
          description: 'Nested child nodes in the requirement tree'
          type: array
          items:
            $ref: '#/components/schemas/blueprint_requirement_node'
          nullable: true
      type: object
    blueprint_tier:
      title: 'Blueprint Tier'
      description: 'Raw blueprint tier as imported from the source payload.'
      properties:
        tier_index:
          description: 'Zero-based index of this crafting tier'
          type: integer
          nullable: true
        craft_time_seconds:
          description: 'Crafting duration in seconds for this tier'
          type: integer
          nullable: true
        requirements:
          oneOf:
            -
              $ref: '#/components/schemas/blueprint_requirement_node'
          nullable: true
          description: 'Recursive requirement tree for this tier'
      type: object
    blueprint_ingredient:
      title: 'Blueprint Ingredient'
      description: 'Condensed ingredient summary used by blueprint list and detail responses.'
      properties:
        name:
          description: 'Display name of the ingredient'
          type: string
          nullable: true
        kind:
          description: 'Ingredient kind'
          type: string
          enum:
            - resource
            - item
          nullable: true
        resource_type_uuid:
          description: 'UUID of the ingredient resource type (see GET /api/commodities)'
          type: string
          format: uuid
          nullable: true
        item_uuid:
          description: 'UUID of the ingredient item (see GET /api/items)'
          type: string
          format: uuid
          nullable: true
        quantity_scu:
          description: 'Quantity in Standard Cargo Units (for resources)'
          type: number
          format: float
          nullable: true
        quantity:
          description: 'Discrete count (for items)'
          type: number
          format: float
          nullable: true
        link:
          description: 'API URL for the ingredient'
          type: string
          format: uri
          nullable: true
