          $ref: '#/components/parameters/comm_link_includes'
        -
          name: 'filter[id]'
          in: query
          description: 'Exact match on the Comm-Link CIG ID'
          schema:
            type: integer
            example: 12663
        -
          name: 'filter[title]'
          in: query
          description: 'Partial match on the Comm-Link title'
          schema:
            type: string
            example: 'This Week in Star Citizen'
        -
          name: 'filter[content]'
          in: query
          description: 'Full-text search within English Comm-Link translations'
          schema:
            type: string
            example: 'star citizen'
        -
          name: 'filter[channel]'
          in: query
          description: 'Exact match on channel name (see GET /api/comm-links/filters for valid values)'
          schema:
            type: string
            example: Engineering
        -
          name: 'filter[series]'
          in: query
          description: 'Exact match on series name (see GET /api/comm-links/filters for valid values)'
          schema:
            type: string
            example: 'Around the Verse'
        -
          name: 'filter[category]'
          in: query
          description: 'Exact match on category name (see GET /api/comm-links/filters for valid values)'
          schema:
            type: string
            example: General
        -
          name: 'filter[created_at]'
          in: query
          description: 'Filter by publication year (YYYY) or exact date (YYYY-MM-DD)'
          schema:
            type: string
            example: '2025'
        -
          name: sort
          in: query
          description: 'Sort field. Prefix with "-" for descending. Supported: id, title, images_count, links_count, channel, category, series, created_at.'
          schema:
            type: string
            example: '-id'
      responses:
        '200':
          description: 'Paginated list of Comm-Links'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/comm_link' } }
                  links: { allOf: [{ $ref: '#/components/schemas/pagination_links' }] }
                  meta: { allOf: [{ $ref: '#/components/schemas/pagination_meta' }] }
                type: object
