  /api/search:
    get:
      tags:
        - Search
      summary: 'Unified Search Across All Game Data'
      description: 'Search across items, vehicles, starmap locations, commodities, blueprints, and missions simultaneously. Returns results grouped by type, limited to 5 results per group.'
      operationId: searchGameData
      parameters:
        -
          name: 'filter[query]'
          in: query
          description: 'Search query (minimum 2 characters). Searches names, class names, and other identifiers.'
          required: true
          schema:
            type: string
            minLength: 2
            example: Carrack
          examples:
            ship_search:
              summary: 'Search for a ship'
              value: carrack
            item_search:
              summary: 'Search for an item'
              value: arrow
        -
          $ref: '#/components/parameters/version'
      responses:
        '200':
          description: 'Grouped search results'
          content:
            application/json:
              schema:
                properties:
                  data: { type: array, items: { properties: { type: { type: string, example: items }, label: { type: string, example: Items }, results: { type: array, items: { properties: { name: { type: string, example: Arrow }, class_name: { type: string, example: AEGS_Arrow, nullable: true }, classification: { type: string, example: fighter, nullable: true }, classification_label: { type: string, example: Fighter, nullable: true }, item_type_label: { type: string, example: Weapon, nullable: true }, extra_label: { type: string, example: Fighter, nullable: true }, web_url: { type: string, example: 'https://example.com/vehicles/arrow' }, api_url: { type: string, example: 'https://example.com/api/vehicles/arrow' } }, type: object } } }, type: object } }
                type: object
              examples:
                ship_search_results:
                  summary: 'Grouped results for a ship search'
                  value: { data: [{ type: vehicles, label: Vehicles, results: [{ name: Carrack, class_name: ANVL_Carrack, classification: null, classification_label: null, item_type_label: null, extra_label: Exploration, web_url: 'https://star-citizen.wiki/vehicles/carrack', api_url: 'https://api.star-citizen.wiki/api/vehicles/carrack' }] }] }
        '422':
          description: 'Validation error - filter[query] is required and must be at least 2 characters'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation_error_response'
        '429':
          description: 'Rate limit exceeded. Search endpoints are limited to 60 requests per minute per IP.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rate_limit_error_response'
  '/api/search/{query}':
    get:
      tags:
        - Search
      summary: 'Resolve Search Query'
      description: 'Resolve a search query to the best-matching entity and redirect to its API URL, preserving query parameters such as locale, include, and version. Useful for quick lookups where you know the exact name.'
      operationId: resolveSearchQuery
      parameters:
        -
          name: query
          in: path
          description: 'Entity name, class name, or UUID to resolve.'
          required: true
          schema:
            type: string
            example: Carrack
        -
          $ref: '#/components/parameters/version'
      responses:
        '302':
          description: "Redirect to the matched entity's API URL."
        '404':
          description: 'No matching entity found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error_response'
