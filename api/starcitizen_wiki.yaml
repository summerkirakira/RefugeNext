            type: string
        -
          name: 'filter[classification]'
          in: query
          description: 'Narrow facets to items with matching classification. Example: `FPS.Armor.Torso`'
          schema:
            type: string
        -
          name: 'filter[size]'
          in: query
          description: 'Narrow facets to items with this size. Example: `3`'
          schema:
            type: number
        -
          name: 'filter[grade]'
          in: query
          description: 'Narrow facets to items with this grade. Example: `3`'
          schema:
            type: number
        -
          name: 'filter[class]'
          in: query
          description: 'Narrow facets to items with this class. Example: `Military`'
