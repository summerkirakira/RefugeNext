              properties:
                image:
                  description: 'The image to reverse-search (max 5 MB)'
                  type: string
                  format: binary
                similarity:
                  description: 'Similarity threshold percentage (1-100). Defaults to 75.'
                  type: integer
                  maximum: 100
                  minimum: 1
                  example: 80
              type: object
      responses:
        '200':
          description: 'List of similar images with associated Comm-Links'
