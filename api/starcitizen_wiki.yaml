          description: 'Included images when the `images` relation is loaded.'
          type: array
          items:
            $ref: '#/components/schemas/comm_link_image'
        images_count:
          description: 'Total number of images associated with this Comm-Link.'
          type: integer
          example: 5
        links:
          description: 'Included links when the `links` relation is loaded.'
          type: array
          items:
            $ref: '#/components/schemas/comm_link_link'
        links_count:
          description: 'Total number of external links in the Comm-Link content.'
          type: integer
          example: 3
        comment_count:
          description: 'Number of comments on the original RSI post.'
          type: integer
          example: 42
        created_at:
          description: 'ISO 8601 timestamp of when the Comm-Link was published.'
          type: string
          format: date-time
        translations:
          $ref: '#/components/schemas/translation'
        created_at_human:
          description: 'Human-readable relative time since publication.'
          type: string
          example: '1 hour ago'
      type: object
    comm_link_image:
      title: 'Comm-Link Image'
      description: 'An image embedded in a Comm-Link, sourced from the RSI media CDN.'
      properties:
        id:
          description: 'Internal database identifier.'
          type: integer
        name:
          description: 'File name or path segment of the image.'
          type: string
          example: Starshipbridge.jpg
        rsi_url:
          description: 'Full URL to the image on the RSI media CDN.'
          type: string
          format: uri
          example: /media/bluo97w6u7n1ur/source/Starshipbridge.jpg
        api_url:
          description: 'API URL for this image resource.'
          type: string
          format: uri
          nullable: true
        alt:
          description: 'Alternative text for the image.'
          type: string
        size:
          description: 'File size in bytes.'
          type: integer
          example: 1504015
        mime_type:
          description: 'MIME type of the image file.'
          type: string
          example: image/jpeg
        last_modified:
          description: 'ISO 8601 timestamp of when the image was last modified on the CDN.'
          type: string
          format: date-time
        tags:
          description: 'Tags associated with the image when the `tags` relation is loaded.'
          type: array
          items:
            properties:
              name:
                description: 'Tag name.'
                type: string
              translated_name:
                description: 'Translated tag name.'
                type: string
                nullable: true
              images_count:
                description: 'Number of images sharing this tag.'
                type: integer
            type: object
          nullable: true
        similar_url:
          description: 'API URL to find visually similar images.'
          type: string
          format: uri
        comm_links:
          description: 'Comm-Links that reference this image, included when the `commLinks` relation is loaded.'
          type: array
          items:
            properties:
              id:
                description: 'CIG identifier of the Comm-Link'
                type: integer
              title:
                description: 'Title of the Comm-Link'
                type: string
              api_url:
                description: 'API URL for this Comm-Link resource.'
                type: string
                format: uri
              web_url:
                description: 'Public web URL for this Comm-Link.'
                type: string
                format: uri
            type: object
          nullable: true
        duplicates:
          description: 'Duplicate images that share the same base image, included when the `duplicates` relation is loaded.'
          type: array
          items:
            properties:
              id:
                description: 'Internal database ID of the duplicate image'
                type: integer
              name:
                description: 'File name of the duplicate image'
                type: string
            type: object
          nullable: true
        base_image:
          description: 'The original image this is a duplicate of, included when the `baseImage` relation is loaded.'
          properties:
            id:
              description: 'Internal database ID of the base image'
              type: integer
            name:
              description: 'File name of the base image'
              type: string
          type: object
          nullable: true
        similarity:
          description: 'Similarity percentage to the search image. Only present in reverse image search results.'
          type: integer
          nullable: true
      type: object
