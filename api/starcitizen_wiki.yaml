          example: 1
        from:
          description: 'Index of the first item in this page.'
          type: integer
          example: 1
        last_page:
          description: 'Last available page number.'
          type: integer
          example: 5
        per_page:
          description: 'Number of items per page.'
          type: integer
          example: 30
        to:
          description: 'Index of the last item in this page.'
          type: integer
          example: 30
        total:
          description: 'Total number of items across all pages.'
          type: integer
          example: 150
        links:
          description: 'Pagination navigation links with page URLs.'
          type: array
          items:
            properties:
              url:
                type: string
                nullable: true
              label:
                type: string
              active:
                type: boolean
            type: object
        path:
          description: 'Base URL path for pagination.'
          type: string
