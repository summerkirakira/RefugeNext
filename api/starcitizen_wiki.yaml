              nullable: true
            items:
              description: 'Physical items associated with this commodity in the game.'
              type: array
              items:
                properties:
                  name: { description: 'Item display name.', type: string }
                  uuid: { description: 'UUID of the item entity.', type: string, format: uuid, nullable: true }
                  type: { description: 'Item type classification.', type: string, nullable: true }
                  type_label: { description: 'Human-readable label for the item type.', type: string, nullable: true }
                  sub_type: { description: 'Item sub-type classification.', type: string, nullable: true }
                  sub_type_label: { description: 'Human-readable label for the item sub-type.', type: string, nullable: true }
                  size: { description: 'Item size grade.', type: integer, nullable: true }
                  web_url: { description: 'Frontend URL for the item page.', type: string, format: uri, nullable: true }
                  link: { description: 'API link to the item details.', type: string, format: uri, nullable: true }
                type: object
              nullable: true
            link:
              description: "API link to this commodity's full details."
              type: string
              format: uri
            web_url:
              description: "Frontend URL for this commodity's page."
              type: string
              format: uri
            uex_prices:
              description: 'Commodity prices from UEX Corp API.'
              properties:
                purchase:
                  description: 'Purchase prices from UEX Corp.'
                  type: array
                  items: { $ref: '#/components/schemas/uex_price' }
              type: object
              nullable: true
          type: object
    area_exception:
      title: 'Area Exception'
      description: 'An area-specific modifier that overrides the default deposit probability for a specific resource.'
      properties:
        name:
          description: 'Name of the area where the exception applies.'
          type: string
          nullable: true
        modifier:
          description: 'Probability multiplier applied within this area (e.g. 2.0 = double chance).'
          type: number
      type: object
    area_boost:
      title: 'Area Boost'
      description: 'An area with a global modifier that boosts deposit spawn rates above the baseline.'
      properties:
        name:
          description: 'Name of the boosted area.'
          type: string
          nullable: true
        global_modifier:
          description: 'Global probability multiplier for this area (values above 1 indicate a boost).'
          type: number
          nullable: true
      type: object
    clustering_param:
      title: 'Clustering Param'
      description: 'A single clustering variation with its own size, proximity, and probability settings.'
      properties:
        min_size:
          description: 'Minimum cluster size.'
          type: number
          nullable: true
        max_size:
          description: 'Maximum cluster size.'
          type: number
          nullable: true
        min_proximity:
          description: 'Minimum distance between deposit instances in the cluster.'
          type: number
          nullable: true
        max_proximity:
          description: 'Maximum distance between deposit instances in the cluster.'
          type: number
          nullable: true
        relative_probability:
          description: 'Relative probability weight for this clustering variation.'
          type: number
          nullable: true
      type: object
    clustering:
      title: Clustering
      description: 'Defines how deposits are grouped into clusters, including size, proximity, and probability parameters.'
      properties:
        key:
          description: 'Internal clustering configuration key.'
          type: string
          nullable: true
        min_size:
          description: 'Minimum number of deposits in a cluster.'
          type: number
          nullable: true
        max_size:
          description: 'Maximum number of deposits in a cluster.'
          type: number
          nullable: true
        min_proximity:
          description: 'Minimum distance between clustered deposits.'
          type: number
          nullable: true
        max_proximity:
          description: 'Maximum distance between clustered deposits.'
          type: number
          nullable: true
        probability:
          description: 'Raw probability of clustering occurring (0-1).'
          type: number
          nullable: true
        probability_percent:
          description: 'Clustering probability expressed as a percentage (0-100).'
          type: number
          nullable: true
        params:
          description: 'List of clustering variations with individual probability weights.'
          type: array
          items:
            $ref: '#/components/schemas/clustering_param'
      type: object
    material_entry:
      title: 'Material Entry'
      description: 'A single material (commodity) found within a deposit, including quality range and probability data.'
      properties:
        key:
          description: 'Unique material key identifier.'
          type: string
          nullable: true
        name:
          description: 'Display name of the material.'
          type: string
          nullable: true
        uuid:
          description: 'UUID of the commodity this material represents.'
          type: string
          format: uuid
          nullable: true
        is_current:
          description: 'Whether this material is the primary commodity being viewed.'
          type: boolean
        quality_min:
          description: 'Minimum quality value of this material in the deposit.'
          type: integer
          nullable: true
        quality_max:
          description: 'Maximum quality value of this material in the deposit.'
          type: integer
          nullable: true
        quality_mean:
          description: 'Average quality value of this material.'
          type: integer
          nullable: true
        quality_stddev:
          description: 'Standard deviation of the quality distribution.'
          type: integer
          nullable: true
        min_percentage:
          description: 'Minimum composition percentage of this material (0-100).'
          type: number
        max_percentage:
          description: 'Maximum composition percentage of this material (0-100).'
          type: number
        instability:
          description: 'Instability rating of this material, affecting mining difficulty.'
          type: number
          nullable: true
        resistance:
          description: 'Resistance rating of this material, affecting mining difficulty.'
          type: number
          nullable: true
        group_probability:
          description: 'Raw probability of this material occurring in the deposit group (0-1).'
          type: number
        group_probability_percent:
          description: 'Group probability expressed as a percentage (0-100).'
          type: number
        relative_probability:
          description: 'Raw relative probability compared to other materials in the deposit (0-1).'
          type: number
        relative_probability_percent:
          description: 'Relative probability expressed as a percentage (0-100).'
          type: number
        quality_quantized_values:
          description: "The discrete set of quantized quality values a player can actually receive, filtered by the material's quality range. Each value corresponds to one reachable quantization band."
          type: array
          items:
            type: integer
          example:
            - 521
            - 664
            - 710
            - 874
            - 907
            - 970
            - 1000
          nullable: true
        quality_quantization:
          description: 'All possible quantized quality values for this material from the source data. Use quality_quantized_values for the filtered set reachable on this specific deposit.'
          type: array
          items:
            type: integer
          example:
            - 348
            - 523
            - 686
            - 717
            - 861
            - 916
            - 975
            - 1000
          nullable: true
      type: object
    harvestable_setup:
      title: 'Harvestable Setup'
      description: 'Respawn and despawn timing configuration for harvestable deposit instances.'
      properties:
        respawn_seconds:
          description: 'Time in seconds before a harvested instance respawns.'
          type: integer
          nullable: true
        respawn_formatted:
          description: 'Human-readable respawn duration (e.g. "5m 30s").'
          type: string
          nullable: true
        despawn_seconds:
          description: 'Time in seconds before an uncollected instance despawns.'
          type: integer
          nullable: true
        despawn_formatted:
          description: 'Human-readable despawn duration (e.g. "10m").'
          type: string
          nullable: true
        relative_probability:
          description: 'Raw relative spawn probability for this harvestable (0-1).'
          type: number
          nullable: true
        relative_probability_percent:
          description: 'Relative spawn probability expressed as a percentage (0-100).'
          type: number
          nullable: true
        respawn_multiplier:
          description: 'Multiplier applied to the base respawn time.'
          type: number
          nullable: true
        additional_wait_seconds:
          description: 'Extra wait time in seconds added when nearby players are present.'
          type: integer
          nullable: true
        additional_wait_formatted:
          description: 'Human-readable additional wait duration (e.g. "2m").'
          type: string
          nullable: true
      type: object
    deposit_base:
      title: 'Deposit Base'
      description: 'Base schema for a mineable or harvestable deposit, shared across commodity and starmap resources.'
      properties:
        key:
          description: 'Unique deposit key identifier.'
          type: string
        label:
          description: 'Human-readable deposit name derived from the key.'
          type: string
        signature:
          description: 'Electromagnetic signature strength of the deposit.'
          type: integer
          nullable: true
        area_exceptions:
          description: 'Area-specific probability modifiers that override the default for this deposit.'
          type: array
          items:
            $ref: '#/components/schemas/area_exception'
          nullable: true
        clustering:
          oneOf:
            -
              $ref: '#/components/schemas/clustering'
          nullable: true
          description: 'Clustering configuration for deposit groupings, if applicable.'
        harvestable_setup:
          oneOf:
            -
              $ref: '#/components/schemas/harvestable_setup'
          nullable: true
          description: 'Respawn and despawn timing data for harvestable deposits.'
        provider_names:
          description: 'List of unique provider names that generate this deposit.'
          type: array
          items:
            type: string
        materials:
          description: 'List of materials (commodities) found in this deposit with their quality and probability data.'
          type: array
          items:
            $ref: '#/components/schemas/material_entry'
        quality_min:
          description: 'Minimum quality across all instances of this deposit.'
          type: integer
          nullable: true
        quality_max:
          description: 'Maximum quality across all instances of this deposit.'
          type: integer
          nullable: true
        relative_probability_min:
          description: 'Lowest relative probability among deposit instances (0-1).'
          type: number
          nullable: true
        relative_probability_max:
          description: 'Highest relative probability among deposit instances (0-1).'
          type: number
          nullable: true
        relative_probability_min_percent:
          description: 'Lowest relative probability as a percentage (0-100).'
          type: number
          nullable: true
        relative_probability_max_percent:
          description: 'Highest relative probability as a percentage (0-100).'
          type: number
          nullable: true
      type: object
    faction_index:
      title: 'Faction Summary'
