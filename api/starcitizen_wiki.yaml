  parameters:
    comm_link_includes:
      name: include
      in: query
      explode: false
      allowReserved: true
      schema:
        description: 'Available Comm-Link includes'
        type: array
        items:
          type: string
          enum:
            - images
            - links
    page:
      name: page
      in: query
      description: 'Page number for pagination (starts at 1). Prefer using `page[number]` instead.'
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    page_number:
      name: 'page[number]'
      in: query
      description: 'Page number for pagination (starts at 1).'
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    page_size:
      name: 'page[size]'
      in: query
      description: 'Number of results per page. Maximum 200.'
      required: false
      schema:
        type: integer
        default: 30
        maximum: 200
        minimum: 1
    locale:
      name: locale
      in: query
      description: 'Locale code for translated fields. Supported values depend on available translations (e.g. en, de, zh).'
      required: false
      schema:
        type: string
    include:
      name: include
      in: query
      description: "Comma-separated list of relationships to include. Available includes vary per endpoint, see each endpoint's description for supported values."
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
    sort:
      name: sort
      in: query
      description: 'Comma-separated sort fields. Prefix with `-` for descending. Supported fields vary per endpoint.'
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
    version:
      name: version
      in: query
      description: 'Game version code to scope results to. Omit to use the current default version. Use `GET /api/game-versions` to list available versions and `GET /api/game-versions/default` to discover the default.'
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
  securitySchemes:
    sanctum:
      type: http
      description: 'Bearer token authentication via Laravel Sanctum personal access tokens. Most endpoints are public and do not require authentication.'
      scheme: bearer
